<div class="container mt-4">

    <form [formGroup]="FineGoldForm">

        <div class="card ledger-card shadow-sm border-0">

            <div class="table-responsive">
                <table class="table ledger-table mb-0">

                    <thead>
                    <tr class="table-title">
                        <th colspan="4">Fine Gold Transactions</th>
                    </tr>

                    <tr class="table-head">
                        <th>#</th>
                        <th>Particulars</th>
                        <th class="text-end">Fine</th>
                        <th>Comment</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr formGroupName="closingBalanceOfPreviousMonth">
                        <td>1</td>
                        <td class="fw-semibold">Opening Balance</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <tr formGroupName="transferredToProduction">
                        <td>2</td>
                        <td class="text-danger">↘ Transferred to Production</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <tr formGroupName="returnedFromProduction">
                        <td>3</td>
                        <td class="text-success">↗ Returned from Production</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <tr formGroupName="fineToGini">
                        <td>4</td>
                        <td class="text-danger">↗ Fine → 92</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <tr formGroupName="fromGiniToFine">
                        <td>5</td>
                        <td class="text-success">↘ 92 → Fine</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <tr formGroupName="nitricToFine">
                        <td>5</td>
                        <td class="text-success">↘ Nitric → Fine</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <!--Withdraw by owner-->
                    <tr formGroupName="withdrawByOwner">
                        <td>5</td>
                        <td class="text-danger">Withdraw By Owner</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <!--Submit by owner-->
                    <tr formGroupName="submitByOwner">
                        <td>5</td>
                        <td class="text-success">Submit By Owner</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <tr formGroupName="lossOfFine">
                        <td>6</td>
                        <td class="text-danger">↘ Loss</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    <tr formGroupName="excessOfFine">
                        <td>7</td>
                        <td class="text-success">↗ Excess</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>

                    </tbody>

                    <tfoot>
                    <tr formGroupName="closingBalance">
                        <td>#</td>
                        <td class="fw-bold">Closing Balance</td>
                        <td><input type="number" class="form-control text-end" formControlName="fine"></td>
                        <td><input type="text" class="form-control" formControlName="comment"></td>
                    </tr>
                    </tfoot>

                </table>
            </div>

            <div class="card-header d-flex justify-content-between">
                <small>
                    Year: {{selectedYear}} | Month: {{selectedMonth}}
                </small>

                <button class="btn btn-outline-primary btn-sm"
                        (click)="loadSavedData()">
                    📥 View Saved
                </button>

                <button type="button"
                        class="btn btn-light btn-sm px-4"
                        (click)="submit()">
                    💾 Save
                </button>
            </div>
        </div>
    </form>
</div>
