<div class="table-container">

    <!-- Selection Row -->
    <div class="row mb-3 align-items-end">

        <!-- Year Selection -->
        <div class="col-md-3">
            <label class="form-label fw-semibold">
                Select Year
            </label>

            <select class="form-select"
                    [(ngModel)]="selectedYear"
                    name="year">
                <option value="">-- Select Year --</option>
                <option *ngFor="let year of years"
                        [value]="year">
                    {{ year }}
                </option>
            </select>
        </div>

        <!-- Month Selection -->
        <div class="col-md-3">
            <label class="form-label fw-semibold">
                Select Month
            </label>

            <select class="form-select"
                    [(ngModel)]="selectedMonth"
                    name="month">
                <option value="">-- Select Month --</option>
                <option *ngFor="let month of months"
                        [value]="month.value">
                    {{ month.name }}
                </option>
            </select>
        </div>
        <!-- Button -->
        <div class="col-md-2">
            <button class="btn btn-primary" (click)="reloadComponent()">
                Load
            </button>
        </div>

    </div>

    <app-ninety-two-gold-form
            *ngIf="loadComponent"
            [selectedYear]="selectedYear"
            [selectedMonth]="selectedMonth">
    </app-ninety-two-gold-form>
    <hr>
    <h4>92 Gold Segment End</h4>
    <hr>
    <app-fine-gold-form
        *ngIf="loadComponent"
        [selectedYear]="selectedYear"
        [selectedMonth]="selectedMonth">
    </app-fine-gold-form>
    <!--    for nitric gold-->
    <hr>
    <h4>Fine Gold Segment End</h4>
    <hr>
    <app-nitric-gold-form
            *ngIf="loadComponent"
            [selectedYear]="selectedYear"
            [selectedMonth]="selectedMonth">
    </app-nitric-gold-form>
    <hr>
    <h4>Nitric Gold Segment End</h4>
    <hr>

</div>
